<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPRO POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .navbar { background: #1a237e !important; }
        .premium-card { background: white; border-radius: 12px; border: none; transition: 0.2s; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .premium-card:hover { transform: scale(1.02); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .cart-sticky { position: sticky; top: 80px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">POS<span class="text-warning">SYSTEM</span></a>
            {% if session['user_id'] %}
            <div class="navbar-nav ms-auto gap-3">
                <a class="nav-link active" href="/"><i class="bi bi-cart-plus"></i> Sotuv</a>
                <a class="nav-link" href="/ombor"><i class="bi bi-box"></i> Ombor</a>
                <a class="nav-link" href="/hisobot"><i class="bi bi-bar-chart"></i> Hisobot</a>
                <a class="btn btn-outline-light btn-sm" href="/logout">Chiqish ({{session['username']}})</a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="container-fluid px-4">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
