<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #f4f7fe; font-family: 'Plus Jakarta Sans', sans-serif; }
        .navbar { background: #0b1120 !important; border-bottom: 1px solid #1e293b; }
        .premium-card { 
            background: white; border-radius: 20px; border: 1px solid #e2e8f0; 
            transition: all 0.3s ease; cursor: pointer;
        }
        /* HOVER EFFEKT */
        .premium-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            border-color: #6366f1; 
        }
        .btn-premium { 
            background: #6366f1; color: white; border: none; 
            border-radius: 12px; font-weight: 600; padding: 10px 20px; 
        }
        .btn-premium:hover { background: #4f46e5; color: white; }
        .nav-link { color: #94a3b8 !important; font-weight: 600; }
        .nav-link.active { color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Market<span class="text-primary">PRO</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-shop"></i> Sotuv</a></li>
                    <li class="nav-item"><a class="nav-link" href="/ombor"><i class="bi bi-box"></i> Ombor</a></li>
                    <li class="nav-item"><a class="nav-link" href="/qarzlar"><i class="bi bi-person-exclamation"></i> Qarzlar</a></li>
                    <li class="nav-item"><a class="nav-link" href="/hisobot"><i class="bi bi-graph-up"></i> Hisobot</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">{% block content %}{% endblock %}</div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
