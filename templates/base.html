<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --prm: #6366f1; --bg: #f8fafc; }
        body { background: var(--bg); font-family: sans-serif; }
        .navbar { background: #0f172a !important; }
        .premium-card { background: white; border-radius: 18px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); transition: 0.3s; }
        .btn-premium { background: var(--prm); color: white; border-radius: 12px; border: none; padding: 10px 20px; font-weight: 600; }
        .form-control { border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Market<span class="text-primary">PRO</span></a>
            <div class="navbar-nav ms-auto gap-3">
                <a class="nav-link" href="/"><i class="bi bi-shop"></i> Sotuv</a>
                <a class="nav-link" href="/ombor"><i class="bi bi-box"></i> Ombor</a>
                <a class="nav-link" href="/qarzlar"><i class="bi bi-person"></i> Qarzlar</a>
                <a class="nav-link" href="/hisobot"><i class="bi bi-graph-up"></i> Hisobot</a>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
