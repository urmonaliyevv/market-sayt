<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMarket 2024 - Modern Business</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-bg: linear-gradient(135deg, #1a202c, #2d3748); /* Yumshoqroq gradient */
            --card-bg: rgba(255, 255, 255, 0.05); /* Shaffof kartalar */
            --border-color: rgba(255, 255, 255, 0.1);
            --text-color: #e2e8f0; /* Ochroq matn rangi */
            --accent-color: #6366f1; /* Yangi aksent rangi (indogo) */
            --muted-text: #a0aec0;
            --input-bg: rgba(255, 255, 255, 0.08);
            --input-border: rgba(255, 255, 255, 0.15);
        }
        body { 
            background: var(--primary-bg); 
            background-attachment: fixed;
            font-family: 'Inter', sans-serif; 
            color: var(--text-color);
            line-height: 1.6;
        }
        .navbar { 
            background: rgba(45, 55, 72, 0.6) !important; /* Shaffof navigatsiya */
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0,0,0,0.1);
        }
        .navbar-brand { color: var(--text-color) !important; font-weight: 700; font-size: 1.8rem; }
        .navbar-brand span { color: var(--accent-color); }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border-color);
            border-radius: 1.5rem; /* Yumshoqroq burchaklar */
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3); }

        .btn-primary { 
            background: var(--accent-color); 
            border-color: var(--accent-color); 
            border-radius: 0.75rem; 
            font-weight: 600;
            padding: 0.8rem 1.5rem;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { 
            background: #4f46e5; 
            border-color: #4f46e5;
            transform: translateY(-1px);
        }
        .btn-outline-danger { 
            border-color: #ef4444; 
            color: #ef4444; 
            border-radius: 0.75rem;
            font-weight: 500;
            padding: 0.8rem 1.5rem;
            transition: all 0.2s ease;
        }
        .btn-outline-danger:hover { 
            background: #ef4444; 
            color: white; 
            transform: translateY(-1px);
        }

        .nav-link { 
            color: var(--muted-text) !important; 
            font-weight: 500; 
            padding: 0.75rem 1.25rem !important;
            border-radius: 0.6rem;
            transition: all 0.2s ease;
        }
        .nav-link.active { 
            background: rgba(99, 102, 241, 0.1); /* Aksent rangning shaffof foni */
            color: var(--accent-color) !important; 
            font-weight: 600;
        }
        .nav-link:hover:not(.active) { 
            background: rgba(255, 255, 255, 0.05); 
            color: var(--text-color) !important;
        }

        .form-control {
            background: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-color) !important;
            border-radius: 0.75rem !important;
            padding: 0.75rem 1rem !important;
        }
        .form-control::placeholder { color: var(--muted-text); opacity: 0.7; }
        .form-control:focus {
            border-color: var(--accent-color) !important;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2) !important;
            background: var(--input-bg) !important;
        }
        
        .badge { 
            border-radius: 0.5rem; 
            padding: 0.4em 0.8em; 
            font-weight: 500;
        }
        .badge.bg-light { 
            background-color: rgba(255,255,255,0.1) !important; 
            color: var(--text-color) !important; 
            border: none;
        }
        .badge.bg-primary { 
            background-color: var(--accent-color) !important; 
            color: white !important; 
        }

        /* SweetAlert2 stilini moslash */
        .swal2-popup {
            background: var(--card-bg) !important;
            color: var(--text-color) !important;
            border: 1px solid var(--border-color) !important;
            backdrop-filter: blur(10px) !important;
        }
        .swal2-title { color: var(--text-color) !important; }
        .swal2-html-container { color: var(--muted-text) !important; }
        .swal2-input {
            background: var(--input-bg) !important;
            border: 1px solid var(--input-border) !important;
            color: var(--text-color) !important;
        }
        .swal2-confirm { background: var(--accent-color) !important; color: white !important; }
        .swal2-cancel { background: #475569 !important; color: white !important; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top py-3 mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">PRO<span>MARKET</span></a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Ombor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Hisobot</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Qarzlar</a></li>
                    <li class="nav-item ms-lg-2"><a class="btn btn-outline-danger" href="/logout">Chiqish</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
