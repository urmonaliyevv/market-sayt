<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pro 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary: #4361ee; --bg: #f8f9fa; }
        body { background-color: var(--bg); font-family: 'Inter', sans-serif; }
        .card { border-radius: 16px; border: none; }
        .btn-primary { background: var(--primary); border: none; border-radius: 12px; }
        .nav-link.active { color: var(--primary) !important; font-weight: bold; }
        .bg-soft-primary { background: #e0e7ff; color: #4361ee; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-white bg-white shadow-sm sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="/">🚀 MARKET PRO</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Ombor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Hisobot</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Qarzlar</a></li>
                    <li class="nav-item"><a class="btn btn-light rounded-pill px-4" href="/logout">Chiqish</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
