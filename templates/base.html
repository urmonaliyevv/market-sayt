<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pro Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --main-bg: #0b0f19;
            --card-bg: #151b28;
            --accent: #3b82f6;
            --text: #e5e7eb;
            --muted: #9ca3af;
        }
        body { 
            background-color: var(--main-bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text);
            letter-spacing: -0.02em;
        }
        .navbar { 
            background: rgba(11, 15, 25, 0.8) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .nav-link { color: var(--muted) !important; font-weight: 600; transition: 0.3s; }
        .nav-link.active { color: var(--accent) !important; }
        .btn-primary { 
            background: var(--accent); border: none; border-radius: 14px; 
            padding: 12px 24px; font-weight: 700;
        }
        .rounded-input { 
            background: #1f2937 !important; border: 1px solid rgba(255,255,255,0.1) !important; 
            color: white !important; border-radius: 16px; padding: 12px 18px;
        }
        .rounded-input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15) !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top py-3 mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="/">PRO<span class="text-primary">MARKET</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-3">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Ombor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Hisobot</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Qarzlar</a></li>
                    <li class="nav-item ms-lg-2"><a class="btn btn-outline-danger border-0 rounded-pill px-4" href="/logout">Chiqish</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
