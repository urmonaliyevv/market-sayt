<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketPRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root { --prm: #6366f1; }
        body { background: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        .navbar { background: #0f172a !important; }
        .premium-card { 
            background: white; border-radius: 16px; border: 1px solid #e2e8f0; 
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .premium-card:hover { 
            transform: translateY(-5px); border-color: var(--prm);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .btn-premium { background: var(--prm); color: white; border-radius: 10px; border: none; padding: 10px 20px; font-weight: 600; }
        .btn-premium:hover { background: #4f46e5; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">Market<span class="text-primary">PRO</span></a>
            <div class="navbar-nav ms-auto gap-3">
                <a class="nav-link" href="/"><i class="bi bi-shop"></i> Sotuv</a>
                <a class="nav-link" href="/ombor"><i class="bi bi-box"></i> Ombor</a>
                <a class="nav-link" href="/qarzlar"><i class="bi bi-person"></i> Qarzlar</a>
                <a class="nav-link" href="/hisobot"><i class="bi bi-graph-up"></i> Hisobot</a>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</body>
</html>
