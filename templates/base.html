<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProMarket | Enterprise Edition</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary: #0062ff;
            --bg: #f4f7fe;
            --card: rgba(255, 255, 255, 0.9);
            --text: #1b2559;
        }
        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text);
            background-image: radial-gradient(at 0% 0%, rgba(0, 98, 255, 0.05) 0px, transparent 50%), 
                              radial-gradient(at 100% 100%, rgba(0, 98, 255, 0.05) 0px, transparent 50%);
            min-height: 100vh;
        }
        .navbar { 
            background: rgba(255, 255, 255, 0.7) !important;
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 20px 0;
        }
        .navbar-brand { font-weight: 800; font-size: 24px; color: var(--primary) !important; }
        .card { 
            background: var(--card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08); }
        .nav-link { color: #a3aed0 !important; font-weight: 600; margin: 0 10px; }
        .nav-link.active { color: var(--primary) !important; position: relative; }
        .nav-link.active::after {
            content: ''; position: absolute; bottom: -5px; left: 50%; transform: translateX(-50%);
            width: 5px; height: 5px; background: var(--primary); border-radius: 50%;
        }
        .btn-primary { 
            background: var(--primary); border: none; border-radius: 15px; 
            padding: 12px 25px; font-weight: 700; box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2);
        }
        .rounded-input { 
            background: white !important; border: 1px solid #e0e5f2 !important; 
            border-radius: 15px; padding: 15px; color: var(--text) !important;
        }
        .glass-icon {
            width: 45px; height: 45px; background: rgba(0, 98, 255, 0.1);
            color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-5">
        <div class="container">
            <a class="navbar-brand" href="/">PRO<span style="color: #2b3674;">MARKET</span></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo Paneli</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Resurslar</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Analitika</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Moliya</a></li>
                </ul>
                <div class="ms-lg-4">
                    <a href="/logout" class="btn btn-light rounded-pill px-4 fw-bold">Chiqish</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
</body>
</html>
