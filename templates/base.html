<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pro 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { 
            background-color: #f0f2f5; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: #1a1d23;
        }
        .navbar { 
            backdrop-filter: blur(10px); 
            background: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .card { 
            border: none; 
            border-radius: 20px; 
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        .card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.07); }
        .btn-primary { 
            background: linear-gradient(135deg, #4361ee, #4895ef); 
            border: none; padding: 10px 24px; border-radius: 14px; font-weight: 600;
        }
        .nav-link { font-weight: 500; color: #64748b !important; padding: 10px 20px !important; }
        .nav-link.active { color: #4361ee !important; background: rgba(67, 97, 238, 0.08); border-radius: 12px; }
        .rounded-input { border-radius: 12px; border: 1px solid #e2e8f0; padding: 12px; }
        .rounded-input:focus { box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); border-color: #4361ee; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary fs-3" href="/">🚀 PRO<span class="text-dark">MARKET</span></a>
            <button class="navbar-toggler border-0" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Ombor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Hisobot</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Qarzlar</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-danger rounded-pill px-4" href="/logout">Chiqish</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
