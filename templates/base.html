<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Pro Dark</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-dark: #0f172a; /* Asosiy fon (to'q ko'k-kulrang) */
            --card-dark: #1e293b; /* Kartalar foni */
            --text-main: #f8fafc; /* Asosiy matn */
            --accent: #38bdf8; /* Yorqin ko'k (urg'u berish uchun) */
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body { 
            background-color: var(--bg-dark); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main);
        }
        .navbar { 
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
        }
        .card { 
            background-color: var(--card-dark); 
            border: 1px solid var(--border-color);
            border-radius: 20px; 
            color: var(--text-main);
        }
        .btn-primary { 
            background: var(--accent); 
            border: none; color: #0f172a; font-weight: 700;
        }
        .btn-primary:hover { background: #7dd3fc; color: #0f172a; }
        .nav-link { color: #94a3b8 !important; }
        .nav-link.active { color: var(--accent) !important; font-weight: bold; }
        .rounded-input { 
            background-color: #334155 !important; 
            border: 1px solid var(--border-color) !important; 
            color: white !important;
            border-radius: 12px;
        }
        .rounded-input::placeholder { color: #94a3b8; }
        .table { color: var(--text-main); }
        .table-hover tbody tr:hover { background-color: rgba(255, 255, 255, 0.05); color: white; }
        .badge.bg-light { background-color: #334155 !important; color: var(--accent) !important; border: 1px solid var(--border-color); }
        
        /* SweetAlert To'q rejimda */
        .swal2-popup { background: var(--card-dark) !important; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-white" href="/">🚀 PRO<span style="color: var(--accent);">MARKET</span></a>
            <button class="navbar-toggler border-0 text-white" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Savdo</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/ombor' %}active{% endif %}" href="/ombor">Ombor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/hisobot' %}active{% endif %}" href="/hisobot">Hisobot</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path == '/qarzlar' %}active{% endif %}" href="/qarzlar">Qarzlar</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-outline-danger rounded-pill px-4" href="/logout">Chiqish</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
