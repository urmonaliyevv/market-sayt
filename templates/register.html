<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ro'yxatdan o'tish | ProMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f4f7fe 0%, #e6efff 100%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px rgba(0, 98, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.8);
            text-align: center;
        }
        .brand-logo {
            font-weight: 800;
            font-size: 28px;
            color: #0062ff;
            margin-bottom: 30px;
            display: block;
            text-decoration: none;
        }
        .brand-logo span { color: #2b3674; }
        h2 { color: #2b3674; font-weight: 700; margin-bottom: 10px; }
        p { color: #a3aed0; margin-bottom: 30px; }
        
        .form-label {
            display: block;
            text-align: left;
            font-weight: 600;
            color: #2b3674;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .rounded-input {
            background: #f4f7fe !important;
            border: 1px solid #e0e5f2 !important;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .rounded-input:focus {
            border-color: #0062ff !important;
            box-shadow: 0 0 0 4px rgba(0, 98, 255, 0.1);
        }
        .btn-auth {
            background: #0062ff;
            color: white;
            border: none;
            border-radius: 15px;
            padding: 15px;
            width: 100%;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 10px 20px rgba(0, 98, 255, 0.2);
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 98, 255, 0.3);
            background: #0056e0;
        }
        .footer-link {
            margin-top: 25px;
            font-size: 14px;
            color: #a3aed0;
        }
        .footer-link a {
            color: #0062ff;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <a href="#" class="brand-logo">PRO<span>MARKET</span></a>
    <h2>Xush kelibsiz!</h2>
    <p>Ma'lumotlaringizni kiriting</p>

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">FOYDALANUVCHI NOMI</label>
            <input type="text" name="username" class="form-control rounded-input" placeholder="Masalan: admin" required>
        </div>
        <div class="mb-3">
            <label class="form-label">PAROL</label>
            <input type="password" name="password" class="form-control rounded-input" placeholder="Min. 8 ta belgi" required>
        </div>
        <button type="submit" class="btn-auth">RO'YXATDAN O'TISH</button>
    </form>

    <div class="footer-link">
        Akkauntingiz bormi? <a href="/login">Kirish</a>
    </div>
</div>

</body>
</html>
