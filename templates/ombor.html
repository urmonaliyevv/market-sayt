{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0">📦 Ombor</h3>
    <div class="d-flex gap-2 w-50">
        <input id="searchOmbor" class="form-control rounded-pill" placeholder="Mahsulot qidirish...">
        <button class="btn btn-primary rounded-pill px-4 text-nowrap" data-bs-toggle="modal" data-bs-target="#addModal">
            + Yangi mahsulot
        </button>
    </div>
</div>

<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover m-0 align-middle">
        <thead class="table-light text-center">
            <tr>
                <th class="text-start">Nomi</th>
                <th>Kategoriya</th>
                <th>Sotish narxi</th>
                <th>Qoldiq</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody id="omborTable">
            {% for p in products %}
            <tr class="ombor-item" data-name="{{p.name.lower()}}">
                <td class="fw-bold">{{p.name}}</td>
                <td class="text-center">{{p.category}}</td>
                <td class="text-center text-primary fw-bold">{{p.sell_price|format_money}}</td>
                <td class="text-center">
                    <span class="badge {% if p.stock > 0 %}bg-success{% else %}bg-danger{% endif %}">{{p.stock}} {{p.unit}}</span>
                </td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" 
                            onclick="openEdit('{{p.id}}','{{p.name}}','{{p.category}}','{{p.buy_price}}','{{p.sell_price}}','{{p.stock}}','{{p.unit}}')">
                        Tahrirlash
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="addModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <form action="/ombor" method="POST" class="modal-content border-0 rounded-4 p-4 shadow-lg">
            <h5 class="fw-bold mb-3">Yangi mahsulot</h5>
            <div class="row g-2">
                <div class="col-12"><input name="name" class="form-control" placeholder="Nomi" required></div>
                <div class="col-6"><input name="category" class="form-control" placeholder="Kategoriya (Masalan: Ichimlik)"></div>
                <div class="col-6"><input name="unit" class="form-control" placeholder="Birlik (dona, kg)"></div>
                <div class="col-6"><label class="small">Kelish narxi</label><input type="number" name="buy_price" class="form-control" required></div>
                <div class="col-6"><label class="small">Sotish narxi</label><input type="number" name="sell_price" class="form-control" required></div>
                <div class="col-12"><label class="small">Hozirgi soni</label><input type="number" step="0.1" name="stock" class="form-control" required></div>
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-4 py-2 fw-bold">SAQLASH</button>
        </form>
    </div>
</div>

<script>
// Ombor qidiruvi
document.getElementById('searchOmbor').addEventListener('input', e => {
    let v = e.target.value.toLowerCase();
    document.querySelectorAll('.ombor-item').forEach(tr => {
        tr.style.display = tr.dataset.name.includes(v) ? '' : 'none';
    });
});
</script>
{% endblock %}
