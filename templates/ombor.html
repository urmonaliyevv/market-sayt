{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0 text-dark">📦 Ombor Boshqaruvi</h3>
    <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-lg me-2"></i> Yangi Mahsulot
    </button>
</div>

<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover align-middle m-0 text-center">
        <thead class="table-light">
            <tr>
                <th class="text-start">Mahsulot</th>
                <th>Sotish narxi</th>
                <th>Qoldiq</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td class="text-start py-3">
                    <div class="fw-bold text-dark">{{ p.name }}</div>
                    <small class="text-muted">{{ p.category }}</small>
                </td>
                <td class="fw-bold text-primary">{{ p.sell_price | format_money }}</td>
                <td>
                    <span class="badge {% if p.stock > 0 %}bg-success{% else %}bg-danger{% endif %} rounded-pill">
                        {{ p.stock }} {{ p.unit }}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-light border rounded-pill px-3" 
                            onclick="openEdit('{{p.id}}','{{p.name}}','{{p.category}}','{{p.buy_price}}','{{p.sell_price}}','{{p.stock}}','{{p.unit}}')">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form id="editForm" method="POST" class="modal-content border-0 rounded-4 p-4 shadow-lg">
            <h5 class="fw-bold mb-4">Mahsulotni tahrirlash</h5>
            <div class="row g-3">
                <div class="col-12"><label class="small fw-bold">Nomi</label><input name="name" id="e_name" class="form-control" required></div>
                <div class="col-6"><label class="small fw-bold">Kelish narxi</label><input type="number" name="buy_price" id="e_buy" class="form-control" required></div>
                <div class="col-6"><label class="small fw-bold">Sotish narxi</label><input type="number" name="sell_price" id="e_sell" class="form-control" required></div>
                <div class="col-6"><label class="small fw-bold">Mavjud qoldiq</label><input type="number" step="0.1" name="stock" id="e_stock" class="form-control" required></div>
                <div class="col-6"><label class="small fw-bold">Birlik</label><input name="unit" id="e_unit" class="form-control"></div>
                <div class="col-12"><label class="small fw-bold">Kategoriya</label><input name="category" id="e_cat" class="form-control"></div>
            </div>
            <div class="d-flex gap-2 mt-4">
                <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">Bekor qilish</button>
                <button type="submit" class="btn btn-primary w-100">Yangilash</button>
            </div>
        </form>
    </div>
</div>

<script>
function openEdit(id, n, c, b, s, st, u) {
    document.getElementById('e_name').value = n;
    document.getElementById('e_cat').value = c;
    document.getElementById('e_buy').value = b;
    document.getElementById('e_sell').value = s;
    document.getElementById('e_stock').value = st;
    document.getElementById('e_unit').value = u;
    document.getElementById('editForm').action = '/edit/' + id;
    new bootstrap.Modal(document.getElementById('editModal')).show();
}
</script>
{% endblock %}
