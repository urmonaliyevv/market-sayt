{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold m-0">📦 Ombor Boshqaruvi</h3>
    <button class="btn btn-primary rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addModal">+ Yangi mahsulot</button>
</div>

<div class="card shadow-sm border-0 overflow-hidden">
    <table class="table table-hover align-middle mb-0">
        <thead class="bg-light">
            <tr><th class="ps-4">Nomi</th><th>Kategoriya</th><th>Sotish narxi</th><th>Qoldiq</th><th class="pe-4 text-end">Amal</th></tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td class="ps-4"><b>{{p.name}}</b><br><small class="text-muted">{{p.unit}}</small></td>
                <td><span class="badge bg-soft-primary px-3 rounded-pill">{{p.category}}</span></td>
                <td class="fw-bold">{{p.sell_price | format_money}}</td>
                <td class="{% if p.stock < 5 %}text-danger{% endif %} fw-bold">{{p.stock}} {{p.unit}}</td>
                <td class="pe-4 text-end">
                    <button class="btn btn-light btn-sm border rounded-pill px-3" onclick="openEdit('{{p.id}}','{{p.name}}','{{p.category}}','{{p.buy_price}}','{{p.sell_price}}','{{p.stock}}','{{p.unit}}')">Tahrirlash</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
