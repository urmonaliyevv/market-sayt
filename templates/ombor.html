{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">📦 Ombor Zahirasi</h3>
    <button class="btn btn-dark rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#addModal">
        <i class="bi bi-plus-circle me-2"></i> Yangi Mahsulot
    </button>
</div>

<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover m-0">
        <thead class="table-light">
            <tr>
                <th>Mahsulot</th>
                <th>Kategoriya</th>
                <th>Kelish</th>
                <th>Sotish</th>
                <th>Qoldiq</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody>
            {% for p in products %}
            <tr>
                <td><b class="text-dark">{{p.name}}</b></td>
                <td>{{p.category}}</td>
                <td>{{p.buy_price|format_money}}</td>
                <td class="text-primary fw-bold">{{p.sell_price|format_money}}</td>
                <td>
                    <span class="badge {% if p.stock > 5 %}bg-success{% else %}bg-danger{% endif %}">
                        {{p.stock}} {{p.unit}}
                    </span>
                </td>
                <td>
                    <button class="btn btn-sm btn-outline-secondary rounded-pill px-3" 
                            onclick="openEdit('{{p.id}}','{{p.name}}','{{p.category}}','{{p.buy_price}}','{{p.sell_price}}','{{p.stock}}','{{p.unit}}')">
                        Tahrirlash
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="addModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <form action="/ombor" method="POST" class="modal-content border-0 rounded-4 p-3 shadow-lg">
            <h5 class="fw-bold mb-3">Mahsulot qo'shish</h5>
            <div class="row g-2">
                <div class="col-12"><input name="name" class="form-control" placeholder="Nomi" required></div>
                <div class="col-6"><input name="category" class="form-control" placeholder="Kategoriya"></div>
                <div class="col-6"><input name="unit" class="form-control" placeholder="Birlik (dona/kg)"></div>
                <div class="col-6"><label class="small">Kelish narxi</label><input type="number" name="buy_price" class="form-control" required></div>
                <div class="col-6"><label class="small">Sotish narxi</label><input type="number" name="sell_price" class="form-control" required></div>
                <div class="col-12"><label class="small">Hozirgi qoldiq</label><input type="number" step="0.1" name="stock" class="form-control" required></div>
            </div>
            <button class="btn btn-primary w-100 mt-4 py-2 fw-bold">SAQLASH</button>
        </form>
    </div>
</div>
{% endblock %}
