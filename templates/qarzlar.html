{% extends 'base.html' %}
{% block content %}
<h3 class="fw-bold mb-4">🔴 Qarzlar</h3>
<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover m-0">
        <thead class="bg-light"><tr><th>Mijoz</th><th>Sana</th><th class="text-danger">Qarz</th><th>Amal</th></tr></thead>
        <tbody>
            {% for d in debts %}
            <tr>
                <td class="fw-bold">{{ d.customer_name }}</td>
                <td>{{ d.date.strftime('%d.%m.%Y') }}</td>
                <td class="text-danger fw-bold">{{ d.debt_amount | format_money }}</td>
                <td><button class="btn btn-success btn-sm rounded-pill px-3" onclick="openPay('{{d.id}}', '{{d.customer_name}}', '{{d.debt_amount}}')">To'lash</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="payModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <form id="payForm" method="POST" class="modal-content border-0 rounded-4 p-3 shadow">
            <div class="modal-body text-center">
                <h5 id="m_cust" class="fw-bold"></h5>
                <p class="text-muted">Qarz: <span id="m_debt" class="text-danger fw-bold"></span> so'm</p>
                <input type="number" name="pay_val" class="form-control form-control-lg text-center mt-3" placeholder="Summa" required>
            </div>
            <div class="d-flex gap-2 p-2">
                <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">Bekor</button>
                <button type="submit" class="btn btn-success w-100">To'lash</button>
            </div>
        </form>
    </div>
</div>

<script>
function openPay(id, name, debt) {
    document.getElementById('m_cust').innerText = name;
    document.getElementById('m_debt').innerText = parseFloat(debt).toLocaleString();
    document.getElementById('payForm').action = '/pay_debt/' + id;
    new bootstrap.Modal(document.getElementById('payModal')).show();
}
</script>
{% endblock %}
