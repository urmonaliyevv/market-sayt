{% extends 'base.html' %}
{% block content %}
<h3 class="fw-bold mb-4">👤 Qarzdorlar Ro'yxati</h3>

<div class="row g-3">
    {% for s in debts %}
    <div class="col-md-6 col-lg-4">
        <div class="card border-0 shadow-sm rounded-4 p-3 border-start border-4 border-danger">
            <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                    <h6 class="fw-bold m-0">{{s.customer_name}}</h6>
                    <small class="text-muted">{{s.date.strftime('%d.%m.%Y')}}</small>
                </div>
                <span class="badge bg-danger bg-opacity-10 text-danger">{{s.debt_amount|format_money}} so'm</span>
            </div>
            <p class="small text-muted mb-3">Mahsulot: {{s.product_name}} ({{s.quantity}} ta)</p>
            <form action="/pay_debt/{{s.id}}" method="POST" class="d-flex gap-2">
                <input type="number" name="pay_val" class="form-control form-control-sm" placeholder="Summa" required>
                <button class="btn btn-sm btn-success">YOPISH</button>
            </form>
        </div>
    </div>
    {% else %}
    <div class="text-center py-5">
        <p class="text-muted fs-5">Hozircha qarzlar yo'q! 🎉</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
