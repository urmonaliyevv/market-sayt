{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">🔴 Qarzlar Ro'yxati</h3>
</div>

<div class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover align-middle m-0">
        <thead class="bg-light">
            <tr>
                <th>Mijoz</th>
                <th>Mahsulot</th>
                <th>Sana</th>
                <th class="text-danger">Qarz Summasi</th>
                <th>Amal</th>
            </tr>
        </thead>
        <tbody>
            {% for d in debts %}
            <tr>
                <td class="fw-bold">{{ d.customer_name }}</td>
                <td>{{ d.product_name }}</td>
                <td>{{ d.date.strftime('%d.%m.%Y') }}</td>
                <td class="fw-bold text-danger">{{ d.debt_amount | format_money }}</td>
                <td>
                    <button class="btn btn-success btn-sm rounded-pill px-3" 
                            onclick="openPayModal('{{d.id}}', '{{d.customer_name}}', '{{d.debt_amount}}')">
                        To'lash
                    </button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<div class="modal fade" id="payModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <form id="payForm" method="POST" class="modal-content border-0 rounded-4 shadow-lg p-3">
            <div class="modal-body text-center">
                <i class="bi bi-cash-stack text-success fs-1 mb-3"></i>
                <h5 class="fw-bold mb-1" id="m_cust">Mijoz Ismi</h5>
                <p class="text-muted small">Umumiy qarz: <span id="m_debt" class="fw-bold text-danger">0</span> so'm</p>
                <div class="mt-3 text-start">
                    <label class="small fw-bold">TO'LOV SUMMASI:</label>
                    <input type="number" name="pay_val" class="form-control form-control-lg text-center fw-bold" required>
                </div>
            </div>
            <div class="d-flex gap-2 p-2">
                <button type="button" class="btn btn-light w-100" data-bs-dismiss="modal">Bekor qilish</button>
                <button type="submit" class="btn btn-success w-100">SAQLASH</button>
            </div>
        </form>
    </div>
</div>

<script>
function openPayModal(id, name, amount) {
    document.getElementById('m_cust').innerText = name;
    document.getElementById('m_debt').innerText = parseFloat(amount).toLocaleString();
    document.getElementById('payForm').action = '/pay_debt/' + id;
    new bootstrap.Modal(document.getElementById('payModal')).show();
}
</script>
{% endblock %}
